<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#1a1612" />
  <title>MSAT 영어 · 중학수학능력진단</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@300..700&family=Noto+Serif+KR:wght@400..700&family=Noto+Sans+KR:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      /* Palette — warm academic */
      --bg: #f5f1ea;
      --bg-2: #ede6d9;
      --paper: #fbf8f2;
      --ink: #1a1612;
      --ink-2: #3d342c;
      --ink-3: #6b5d52;
      --ink-4: #9a8d80;
      --line: #d9cfbe;
      --line-2: #bfb099;
      --accent: #8b2a1f;
      /* deep terracotta — primary accent */
      --accent-2: #c4711f;
      /* amber */
      --gold: #b08030;
      --success: #4a6b3a;
      --danger: #a02a28;

      /* Brain region colors */
      --region-limbic: #c4456b;
      /* 주체 — 변연계 (magenta-rose) */
      --region-frontal: #3b6ea3;
      /* 실행 — 전두엽 (deep blue) */
      --region-temporal: #b5812a;
      /* 설명 — 측두엽 (gold) */
      --region-parietal: #5e7a3e;
      /* 정리 — 두정엽 (olive) */
      --region-occipital: #6b4aa0;
      /* 인지 — 후두엽 (violet) */

      --serif: 'Fraunces', 'Noto Serif KR', Georgia, serif;
      --sans: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 14px;

      --shadow-sm: 0 1px 2px rgba(26, 22, 18, .06), 0 2px 8px rgba(26, 22, 18, .04);
      --shadow-md: 0 4px 12px rgba(26, 22, 18, .08), 0 12px 32px rgba(26, 22, 18, .06);
      --shadow-lg: 0 8px 24px rgba(26, 22, 18, .1), 0 24px 60px rgba(26, 22, 18, .12);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(ellipse at 20% 0%, rgba(196, 113, 31, .08), transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(139, 42, 31, .06), transparent 50%),
        var(--bg);
      line-height: 1.55;
      font-size: 16px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle paper texture */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: .4;
      background-image:
        radial-gradient(circle at 25% 25%, rgba(107, 93, 82, .03) 0%, transparent 1px),
        radial-gradient(circle at 75% 75%, rgba(107, 93, 82, .04) 0%, transparent 1px);
      background-size: 3px 3px, 5px 5px;
    }

    /* Typography utilities */
    .serif {
      font-family: var(--serif);
      font-variation-settings: "opsz" 40;
    }

    .display {
      font-family: var(--serif);
      font-variation-settings: "opsz" 144;
      font-weight: 500;
      letter-spacing: -.02em;
    }

    .mono {
      font-family: var(--mono);
    }

    .uppercase {
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: .72rem;
      font-weight: 600;
    }

    /* Layout */
    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
      animation: fadeIn .45s ease both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ========== COVER (PDF-style) ========== */
    .cover {
      max-width: 640px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 48px 32px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
    }

    .cover-top {
      padding-top: 40px;
    }

    .cover-eyebrow {
      font-family: var(--serif);
      font-size: 1rem;
      color: var(--ink-2);
      letter-spacing: .01em;
      font-weight: 400;
    }

    .cover-brackets {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: .2em;
      margin: 14px 0 8px;
    }

    .cover-title {
      font-family: var(--serif);
      font-variation-settings: "opsz" 144;
      font-weight: 300;
      font-size: clamp(3.5rem, 12vw, 5.5rem);
      font-style: italic;
      color: var(--ink);
      line-height: 1;
      margin: 0 0 22px;
      letter-spacing: -.02em;
    }

    .cover-korean {
      font-family: var(--serif);
      font-size: 1rem;
      color: var(--ink-3);
      font-weight: 400;
      letter-spacing: .02em;
    }

    .cover-rule {
      width: 40px;
      height: 1px;
      background: var(--ink-3);
      margin: 32px auto 16px;
    }

    .cover-meta {
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--ink-3);
      letter-spacing: .1em;
    }

    .cover-form {
      margin: 48px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      width: 100%;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }

    .cover-field {
      display: flex;
      align-items: center;
      gap: 18px;
      width: 100%;
    }

    .cover-field-label {
      font-family: var(--serif);
      font-size: .95rem;
      color: var(--ink-2);
      letter-spacing: .3em;
      min-width: 56px;
      text-align: left;
      flex-shrink: 0;
    }

    .cover-field-input {
      flex: 1;
      font-family: var(--serif);
      font-size: 1.05rem;
      color: var(--ink);
      padding: 6px 2px;
      border: none;
      border-bottom: 1px solid var(--ink-3);
      background: transparent;
      outline: none;
      transition: border-color .2s;
    }

    .cover-field-input:focus {
      border-color: var(--accent);
      border-bottom-width: 2px;
      padding-bottom: 5px;
    }

    .cover-bottom {
      display: flex;
      justify-content: center;
      padding-bottom: 32px;
    }

    @media (max-width: 520px) {
      .cover {
        padding: 32px 24px;
      }

      .cover-title {
        font-size: 3.6rem;
      }

      .cover-form {
        max-width: 100%;
      }
    }

    /* ========== INTRO VIEW (legacy, kept for safety) ========== */
    .intro {
      max-width: 780px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .intro-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--ink-3);
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .intro-mark::before {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--ink-3);
    }

    .intro h1 {
      font-family: var(--serif);
      font-variation-settings: "opsz" 144;
      font-weight: 400;
      font-size: clamp(2.4rem, 7vw, 4rem);
      line-height: 1;
      letter-spacing: -.03em;
      margin: 0 0 12px;
      color: var(--ink);
    }

    .intro h1 em {
      font-style: italic;
      color: var(--accent);
      font-weight: 300;
    }

    .intro .subtitle {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      color: var(--ink-3);
      margin: 0 0 40px;
    }

    .intro .korean-title {
      font-family: var(--serif);
      font-size: 1.05rem;
      color: var(--ink-2);
      margin: 0 0 4px;
      font-weight: 500;
    }

    .intro-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin: 32px 0;
    }

    .intro-meta>div {
      padding: 18px 16px;
      border-right: 1px solid var(--line);
    }

    .intro-meta>div:last-child {
      border-right: none;
    }

    .intro-meta .label {
      font-family: var(--mono);
      font-size: .68rem;
      letter-spacing: .14em;
      color: var(--ink-4);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .intro-meta .val {
      font-family: var(--serif);
      font-size: 1.4rem;
      color: var(--ink);
      font-weight: 500;
    }

    .intro-desc {
      font-size: .98rem;
      color: var(--ink-2);
      line-height: 1.7;
    }

    .intro-desc p {
      margin: 0 0 14px;
    }

    .intro-sections {
      display: grid;
      gap: 10px;
      margin: 36px 0;
    }

    .intro-section-row {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px dashed var(--line);
      font-size: .93rem;
    }

    .intro-section-row .n {
      font-family: var(--mono);
      font-size: .8rem;
      color: var(--ink-4);
    }

    .intro-section-row .t {
      color: var(--ink-2);
    }

    .intro-section-row .c {
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--ink-3);
      background: var(--bg-2);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .name-input-wrap {
      margin: 36px 0 24px;
    }

    .name-input-label {
      font-family: var(--mono);
      font-size: .72rem;
      letter-spacing: .14em;
      color: var(--ink-3);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    .name-input {
      width: 100%;
      font-family: var(--serif);
      font-size: 1.4rem;
      color: var(--ink);
      padding: 12px 0;
      border: none;
      border-bottom: 2px solid var(--line-2);
      background: transparent;
      outline: none;
      transition: border-color .2s;
    }

    .name-input:focus {
      border-color: var(--accent);
    }

    .btn {
      font-family: var(--sans);
      font-size: .95rem;
      font-weight: 500;
      padding: 14px 28px;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      transition: all .2s ease;
      letter-spacing: .01em;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--paper);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn-primary:hover {
      background: var(--accent);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .btn-primary:disabled {
      background: var(--ink-4);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-primary .arrow {
      transition: transform .25s ease;
    }

    .btn-primary:hover .arrow {
      transform: translateX(4px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--ink-2);
      border: 1px solid var(--line-2);
    }

    .btn-ghost:hover {
      background: var(--bg-2);
      border-color: var(--ink-3);
    }

    /* ========== TEST VIEW ========== */
    .test-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(245, 241, 234, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .test-header-inner {
      max-width: 820px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .test-logo {
      font-family: var(--serif);
      font-weight: 500;
      font-size: 1.05rem;
      letter-spacing: -.01em;
      color: var(--ink);
    }

    .test-logo em {
      color: var(--accent);
      font-style: italic;
      font-weight: 400;
    }

    .progress-wrap {
      flex: 1;
    }

    .progress-track {
      height: 4px;
      background: var(--line);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      width: 0%;
      transition: width .4s cubic-bezier(.4, 0, .2, 1);
      border-radius: 2px;
    }

    .progress-text {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--ink-3);
      letter-spacing: .08em;
      white-space: nowrap;
      min-width: 52px;
      text-align: right;
    }

    .test-body {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 20px 140px;
    }

    /* Page heading (new page-based layout) */
    .page-heading {
      margin-bottom: 36px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    .page-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: .7rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 16px;
    }

    .page-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
    }

    .page-title {
      font-family: var(--serif);
      font-variation-settings: "opsz" 144;
      font-weight: 400;
      font-size: clamp(1.6rem, 4.5vw, 2.1rem);
      color: var(--ink);
      margin: 0 0 6px;
      letter-spacing: -.02em;
    }

    .page-subtitle {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1rem;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .page-desc {
      font-family: var(--serif);
      font-size: .98rem;
      color: var(--ink-3);
      margin: 6px 0 0;
      line-height: 1.55;
    }

    .section-marker {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 48px 0 28px;
    }

    .section-marker:first-child {
      margin-top: 8px;
    }

    .section-marker .letter {
      font-family: var(--serif);
      font-style: italic;
      font-size: 2.2rem;
      color: var(--accent);
      line-height: 1;
      font-weight: 300;
    }

    .section-marker .meta {
      flex: 1;
    }

    .section-marker .meta .en {
      font-family: var(--serif);
      font-size: 1.3rem;
      color: var(--ink);
      font-weight: 500;
      letter-spacing: -.01em;
    }

    .section-marker .meta .kr {
      font-family: var(--sans);
      font-size: .82rem;
      color: var(--ink-3);
      margin-top: 2px;
    }

    .section-marker .rule {
      flex: 1;
      height: 1px;
      background: var(--line);
      max-width: 40%;
    }

    .passage {
      background: var(--paper);
      border: 1px solid var(--line);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-md);
      padding: 22px 22px;
      margin-bottom: 24px;
      font-family: var(--serif);
      font-size: 1.02rem;
      line-height: 1.75;
      color: var(--ink-2);
      box-shadow: var(--shadow-sm);
    }

    .passage p {
      margin: 0 0 14px;
    }

    .passage p:last-child {
      margin-bottom: 0;
    }

    .passage .footnote {
      font-family: var(--sans);
      font-size: .82rem;
      color: var(--ink-3);
      border-top: 1px dashed var(--line);
      padding-top: 12px;
      margin-top: 16px;
      line-height: 1.5;
    }

    .passage .footnote div {
      margin-bottom: 2px;
    }

    .passage .footnote span {
      color: var(--accent);
      font-family: var(--serif);
      font-style: italic;
    }

    .passage-chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      gap: 12px;
      height: 180px;
      padding: 16px 8px 8px;
      border-top: 1px dashed var(--line);
      margin-top: 16px;
    }

    .passage-chart .bar-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      height: 100%;
      gap: 6px;
    }

    .passage-chart .bar {
      width: 100%;
      max-width: 44px;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      border-radius: 3px 3px 0 0;
      position: relative;
    }

    .passage-chart .bar::before {
      content: attr(data-val);
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--ink-2);
    }

    .passage-chart .bar-label {
      font-family: var(--serif);
      font-size: .85rem;
      color: var(--ink-2);
    }

    .question {
      margin-bottom: 32px;
      scroll-margin-top: 80px;
    }

    .question-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 14px;
    }

    .question-num {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--accent);
      min-width: 32px;
    }

    .question-text {
      font-family: var(--serif);
      font-size: 1.02rem;
      color: var(--ink);
      line-height: 1.6;
      font-weight: 400;
      flex: 1;
    }

    .question-text .blank {
      display: inline-block;
      min-width: 60px;
      border-bottom: 1.5px solid var(--ink-3);
      margin: 0 3px;
    }

    .question-sub {
      font-family: var(--sans);
      font-size: .88rem;
      color: var(--ink-3);
      margin: 6px 0 14px 42px;
      line-height: 1.55;
    }

    .question-sub.quote {
      font-family: var(--serif);
      font-style: italic;
      font-size: .96rem;
      color: var(--ink-2);
      background: var(--bg-2);
      padding: 14px 16px;
      border-left: 2px solid var(--line-2);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin-left: 42px;
    }

    .question-sub.quote .footnote {
      display: block;
      font-family: var(--sans);
      font-style: normal;
      font-size: .78rem;
      color: var(--ink-3);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--line);
    }

    .question-sub.quote .footnote span {
      color: var(--accent);
      font-style: italic;
    }

    .options {
      margin-left: 42px;
      display: grid;
      gap: 8px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all .15s ease;
      font-size: .95rem;
      line-height: 1.5;
      color: var(--ink-2);
    }

    .option:hover {
      border-color: var(--line-2);
      background: var(--bg-2);
    }

    .option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option .letter {
      font-family: var(--serif);
      font-weight: 500;
      color: var(--ink-3);
      min-width: 20px;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .option .text {
      flex: 1;
    }

    .option.selected {
      border-color: var(--accent);
      background: #fbf2ed;
      color: var(--ink);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .option.selected .letter {
      color: var(--accent);
    }

    /* Writing box */
    .writing-box {
      margin-left: 42px;
    }

    .writing-label {
      font-family: var(--serif);
      font-size: .95rem;
      color: var(--ink-2);
      margin: 12px 0 6px;
      font-weight: 500;
    }

    .writing-textarea {
      width: 100%;
      min-height: 120px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--paper);
      font-family: var(--serif);
      font-size: 1rem;
      line-height: 1.7;
      color: var(--ink);
      resize: vertical;
      outline: none;
      transition: border-color .2s;
    }

    .writing-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(139, 42, 31, .08);
    }

    /* Submit bar */
    .submit-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(245, 241, 234, 0.95);

    .ai-loading .hint {

    .report-content {

      color: var(--ink-2);

      font-size: 1.15rem;
      font-weight: 600;
      color: var(--ink);
      margin: 32px 0 12px;

    .report-content h5 {
      font-family: var(--sans);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ink-2);
      margin: 24px 0 8px;
    }

    .report-content ul,
    .report-content ol {
      margin: 0 0 20px;
      padding-left: 24px;
    }

    .report-content li {
      margin-bottom: 8px;
    }

    .global-footer {

      font-size: 0.75rem;
      color: var(--ink-4);
      padding: 32px 0 24px;
      margin-top: auto;
    }

    .report-content h3 {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--ink);
      margin: 32px 0 12px;
      padding-top: 24px;
      border-top: 1px solid var(--line);

    .report-content h3:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .report-content h4 {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--ink);
      margin: 20px 0 8px;
    }

    .report-content p {
      margin: 0 0 14px;
      font-size: 1rem;
    }

    .report-content ul {
      padding-left: 22px;
      margin: 10px 0 16px;
    }

    .report-content li {
      margin-bottom: 6px;
      font-size: .98rem;
    }

    .report-content strong {

    .weakness-block {

    .solution-card {

      font-weight: 500;

    .report-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 40px;
    }

    /* Error state */
    .ai-error {

    /* Mobile */
    @media (max-width: 720px) {
      body {
        font-size: 15px;

      .intro {
        padding: 32px 20px 60px;

      .intro-meta {

      .intro-meta>div {
        border-right: none;

      .test-body {
        padding: 24px 16px 140px;

      .question-head {

      .question-sub,

      .section-marker .rule {
        display: none;
      }

      .section-marker {
        flex-wrap: wrap;
      }

      .brain-grid {

      .score-cell {

      .score-cell .val {

        padding: 24px 20px;

        font-size: 1.2rem;

      }

      .submit-bar-inner>div:last-child .btn {
        flex: 1;
        justify-content: center;
      }

      .submit-bar .submit-status {
        text-align: center;
      }

      .test-header-inner {
        padding: 12px 16px;
        gap: 10px;
      }

      .test-logo {
        font-size: .95rem;
      }

      .passage {
        font-size: .96rem;
        padding: 18px;
      }

      .option {
        font-size: .92rem;
        padding: 11px 12px;
      }

      .question-text {
        font-size: .98rem;
      }

    @media (max-width: 420px) {
      .intro h1 {
        font-size: 2.2rem;
      }

      .section-marker .letter {

    /* Print */
    @media print {

      .submit-bar,
      .test-header,
      .btn,
      .report-actions {
        display: none !important;
      }
    }
  </style>

    }

      const e = document.createElement(tag);
      Object.entries(attrs).forEach(([k, v]) => {
        if (v === null || v === undefined) return;
        if (k === "class") e.className = v;
        else if (k === "html") e.innerHTML = v;
        else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
        else e.setAttribute(k, v);
      });
      children.flat().forEach(c => {
        if (c == null) return;
        if (typeof c === "string") e.appendChild(document.createTextNode(c));
        else e.appendChild(c);
      });
      return e;
    }

      // Prompt quote (mood/tone, inference, sentence ordering long prompts)
      if (q.prompt) {
        const qt = el("div", { class: "question-sub quote", html: q.prompt });
        if (q.footnotes && q.footnotes.length) {
          const fn = el("div", { class: "footnote" });
          q.footnotes.forEach(f => fn.append(el("div", { html: `<span>${f.term}</span> — ${f.mean}` })));
          qt.append(fn);

        qEl.append(qt);
      }

      // Options or Writing
      if (q.type === "mc") {
        const opts = el("div", { class: "options" });
        const letters = ["A", "B", "C", "D", "E"];
        q.options.forEach((opt, i) => {
          const letter = letters[i];
          const isSelected = state.answers[q.n] === letter;
          const lblClasses = "option" + (isSelected ? " selected" : "");
          const lbl = el("label", { class: lblClasses, "data-q": q.n, "data-val": letter });
          const radio = el("input", { type: "radio", name: `q${q.n}`, value: letter });
          if (isSelected) radio.checked = true;
          lbl.append(
            radio,
            el("span", { class: "letter" }, `(${letter})`),
            el("span", { class: "text", html: opt })
          );
          lbl.addEventListener("click", () => selectOption(q.n, letter, lbl));
          opts.append(lbl);
        });
        qEl.append(opts);
      } else if (q.type === "writing") {
        const wbox = el("div", { class: "writing-box" });
        q.fields.forEach(f => {
          wbox.append(el("div", { class: "writing-label" }, f.label));

          const ta = el("textarea", {
            class: "writing-textarea",
            "data-q": q.n,
            "data-key": f.key,

            updateProgress();
          });
          wbox.append(ta);
        });

    /* =====================================================
       Scoring & Analysis
       ===================================================== */
    /* =====================================================
       Scoring & Analysis — Hybrid Absolute + Relative
       =====================================================
       Total 100 points:
       - 28 MC questions split 90 points proportionally (weighted)
       - 2 writing questions, 5 points each, AI-graded (total 10)
    
       Region "activation" is computed both as:
       - Absolute mastery (earned / max, 0–100%)
       - Relative profile (z-score vs the student's own 5-region mean)
       Strong/Weak are picked using both signals together.
       ===================================================== */

    const MC_TOTAL_POINTS = 90;   // 28 MC questions share 90 points
    const WRITING_POINTS_EACH = 5; // 5 pts each, 2 questions = 10 pts
    const MC_COUNT = QUESTIONS.filter(q => q.type === "mc").length;       // 28
    const WRITING_COUNT = QUESTIONS.filter(q => q.type === "writing").length; // 2

    // Helper: questions 23-28 are 4 points, others are 3 points
    const getMcPoints = (n) => (n >= 23 && n <= 28) ? 4 : 3;

    function computeResult(writingScores = null) {
      // writingScores: { 29: 0..5, 30: 0..5 } or null if not graded yet
      // When null, writing questions contribute 0 to region scores and total.

      const regionRaw = { limbic: 0, frontal: 0, temporal: 0, parietal: 0, occipital: 0 };
      const wordRaw = {};
      Object.keys(WORDS).forEach(w => wordRaw[w] = 0);

      let mcCorrect = 0;
      let mcPoints = 0;
      let writingPointsEarned = 0;
      const perQuestion = {};

      QUESTIONS.forEach(q => {
        const ans = state.answers[q.n];

        if (q.type === "mc") {
          const pts = getMcPoints(q.n);
          const correct = ans && ans === q.answer;
          if (correct) {
            mcCorrect++;
            mcPoints += pts;
          }
          perQuestion[q.n] = { type: "mc", correct, userAnswer: ans, pointsEarned: correct ? pts : 0, pointsMax: pts };

          // Region contribution: fractional by credit (0 or 1 for MC)
          const credit = correct ? 1 : 0;
          addRegionCredit(q, credit, regionRaw, wordRaw);

        } else if (q.type === "writing") {
          // AI grades writing 0..5; scale to 0..1 for region contribution
          const score = (writingScores && typeof writingScores[q.n] === "number")
            ? Math.max(0, Math.min(5, writingScores[q.n]))
            : 0;
          const credit = score / WRITING_POINTS_EACH; // 0..1
          writingPointsEarned += score;

          const obj = ans || {};
          const attempted = Object.values(obj).some(v => v && v.trim().length > 0);
          perQuestion[q.n] = {
            type: "writing",
            attempted,
            userAnswer: ans,
            score,
            pointsEarned: score,
            pointsMax: WRITING_POINTS_EACH
          };

          addRegionCredit(q, credit, regionRaw, wordRaw);
        }
      });

      // Absolute percentages per region (0–100)
      const regionAbs = {};
      Object.keys(regionRaw).forEach(k => {
        regionAbs[k] = MAX_REGION[k] > 0 ? (regionRaw[k] / MAX_REGION[k]) * 100 : 0;
      });

      // Relative profile (z-ish score within this student)
      const absValues = Object.values(regionAbs);
      const mean = absValues.reduce((a, b) => a + b, 0) / absValues.length;
      const variance = absValues.reduce((a, b) => a + (b - mean) ** 2, 0) / absValues.length;
      const stdev = Math.sqrt(variance);

      const regionRel = {}; // z-score (can be negative)
      Object.keys(regionAbs).forEach(k => {
        regionRel[k] = stdev > 0.01 ? (regionAbs[k] - mean) / stdev : 0;
      });

      // Hybrid score for ranking strong/weak:
      // - Primary signal is absolute mastery (how well they did)
      // - Relative adjustment breaks ties and highlights intra-student profile
      // We combine: hybrid = absolute + (relative_weight * z * 10)
      // The z boost is small so absolute still dominates; relative helps differentiate when absolute values are close.
      const regionHybrid = {};
      Object.keys(regionAbs).forEach(k => {
        regionHybrid[k] = regionAbs[k] + regionRel[k] * 5; // z·5 point adjustment
      });

      // Rank regions by hybrid score
      const sortedByHybrid = Object.entries(regionHybrid).sort((a, b) => b[1] - a[1]);
      const sortedKeys = sortedByHybrid.map(([k]) => k);

      // Classification logic:
      // - A region is "balanced" overall if stdev is very small (profile is flat)
      // - Strong candidates: top 2 by hybrid, filtered by absolute >= threshold
      // - Weak candidates: bottom 2 by hybrid, filtered by relative z < 0 (truly below this student's average)
      const isBalanced = stdev < 8; // flat profile

      // Always return top 2 / bottom 2 for UI, but also expose "qualified" picks
      const strongest = sortedKeys.slice(0, 2);
      const weakest = sortedKeys.slice(-2).reverse(); // weakest-first

      // Qualified picks (for the AI to focus on)
      // Strong: absolute >= 60 AND z > 0
      // Weak: absolute <= 60 AND z < 0
      // If nothing qualifies (uniform profile), fall back to sortedKeys[0] / last
      const qualifiedStrong = strongest.filter(k => regionAbs[k] >= 60 && regionRel[k] > 0);
      const qualifiedWeak = weakest.filter(k => regionAbs[k] <= 60 && regionRel[k] < 0);

      // Word intensity (0–1), same blend: absolute share of max (already reflects accuracy)
      const wordIntensity = {};
      Object.keys(WORDS).forEach(w => {
        wordIntensity[w] = MAX_WORD[w] > 0 ? (wordRaw[w] / MAX_WORD[w]) : 0;
      });

      // Overall total score (100)
      const mcPointsRounded = Math.round(mcPoints * 10) / 10;
      const writingPointsRounded = Math.round(writingPointsEarned * 10) / 10;
      const totalPoints = Math.round((mcPoints + writingPointsEarned) * 10) / 10;
      const totalPct = Math.round(totalPoints);

      // Performance band (absolute)
      let band;
      if (totalPct >= 90) band = { key: "exceptional", label: "Exceptional" };
      else if (totalPct >= 75) band = { key: "strong", label: "Strong" };
      else if (totalPct >= 60) band = { key: "developing", label: "Developing" };
      else if (totalPct >= 40) band = { key: "emerging", label: "Emerging" };
      else band = { key: "foundational", label: "Foundational" };

      // Round region abs to integers for display
      const regionPct = {};
      Object.keys(regionAbs).forEach(k => regionPct[k] = Math.round(regionAbs[k]));

      return {
        // MC
        mcCorrect,
        mcTotal: MC_COUNT,
        mcPoints: mcPointsRounded,
        mcPointsMax: MC_TOTAL_POINTS,
        mcPct: Math.round((mcCorrect / MC_COUNT) * 100),

        // Writing
        writingScores: writingScores || {},
        writingPoints: writingPointsRounded,
        writingPointsMax: WRITING_COUNT * WRITING_POINTS_EACH,

        // Total
        totalPoints,
        totalPointsMax: 100,
        totalPct,
        band,

        // Regions
        regionRaw,
        regionMax: MAX_REGION,
        regionAbs,          // raw 0-100 absolute mastery (float)
        regionPct,          // rounded int for display
        regionRel,          // z-score vs student's own mean
        regionHybrid,       // combined score used for ranking
        regionMean: mean,
        regionStdev: stdev,
        isBalanced,

        // Strong/Weak
        strongest, weakest,
        qualifiedStrong, qualifiedWeak,

        // Words
        wordRaw, wordIntensity,

        // Per-question
        perQuestion,
      };
    }

    function addRegionCredit(q, credit, regionRaw, wordRaw) {
      if (credit <= 0) return;
      (q.core || []).forEach(w => {
        const r = WORDS[w];
        if (r) {
          regionRaw[r] += CORE_W * credit;
          wordRaw[w] = (wordRaw[w] || 0) + CORE_W * credit;
        }
      });
      (q.aux || []).forEach(w => {
        const r = WORDS[w];
        if (r) {
          regionRaw[r] += AUX_W * credit;
          wordRaw[w] = (wordRaw[w] || 0) + AUX_W * credit;
        }
      });
    }

    /* =====================================================
       Submit → Render Result
       ===================================================== */
    async function handleSubmit() {
      if (state.submitted) return;
      state.submitted = true;

      // Make preliminary result for Worker payload (MC evaluated)
      state.result = computeResult(null);
      state.writingPending = true;

      const root = $("#view-result");
      root.innerHTML = `
        <div class="result-body" style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; text-align:center;">

            <div class="hint" style="color: var(--ink-3);">모든 문항 채점과 AI 분석이 함께 진행됩니다 (약 10-20초)</div>
          </div>
        </div>
      `;
      showView("view-result");

      // Step 2: Ask Worker to grade writing + produce report in one call
      fetchAIReport();
    }

    function renderRegionCards(container) {
      const r = state.result;
      container.innerHTML = "";

      // Sort regions: by hybrid score desc so strongest shows first
      const sortedKeys = Object.entries(r.regionHybrid)
        .sort((a, b) => b[1] - a[1])
        .map(([k]) => k);

      sortedKeys.forEach((k, idx) => {
        const reg = REGIONS[k];
        const pct = r.regionPct[k];
        const z = r.regionRel[k];
        const absolute = r.regionAbs[k];

        // Rank badge text
        let badge = "";
        if (idx === 0) badge = "★ Top";
        else if (idx === 1) badge = "#2";
        else if (idx === 3) badge = "#4";
        else if (idx === 4) badge = "Lowest";

        // Relative indicator
        let relLabel = "";
        if (z > 0.8) relLabel = "↑ Above profile avg";
        else if (z < -0.8) relLabel = "↓ Below profile avg";
        else relLabel = "≈ Near profile avg";

        const card = el("div", { class: "region-card", style: `--region-color: ${reg.color};` },
          el("div", { class: "top" },
            el("div", { class: "name", html: `${reg.kr} <span class="en">${reg.en}</span>` }),
            el("div", { class: "pct" }, `${pct}%`)
          ),
          el("div", { class: "region-bar-track" },
            el("div", { class: "region-bar-fill", style: `--region-color: ${reg.color}; width: ${pct}%;` })
          ),
          el("div", { class: "region-meta" },
            badge ? el("span", { class: "region-badge" }, badge) : null,
            el("span", { class: "region-rel" }, relLabel)
          ),
          el("div", { class: "area" }, reg.desc)
        );
        container.append(card);
      });
    }

    function renderWordsGrid(container) {
      const r = state.result;
      container.innerHTML = "";

      container.style.display = "flex";
      container.style.flexDirection = "column";
      container.style.gap = "32px";

      const sortedByIntensity = Object.keys(WORDS).sort((a, b) => r.wordIntensity[b] - r.wordIntensity[a]);
      const top10 = sortedByIntensity.slice(0, 10);
      const bottom10 = sortedByIntensity.slice(-10);

      function sortAndRender(wordsArr, titleText) {
        const group = el("div", { class: "words-group", style: "page-break-inside: avoid;" });
        const title = el("div", { style: "font-family:var(--sans); font-size:.95rem; font-weight:600; color:var(--ink-2); margin-bottom:14px; letter-spacing:0.04em;" }, titleText);
        const grid = el("div", { style: "display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:10px;" });

        const displayWords = Array.from(new Set(wordsArr));
        displayWords.sort((a, b) => {
          const ra = WORDS[a], rb = WORDS[b];
          if (ra !== rb) return Object.keys(REGIONS).indexOf(ra) - Object.keys(REGIONS).indexOf(rb);
          return r.wordIntensity[b] - r.wordIntensity[a];
        });

        displayWords.forEach(w => {
          const regKey = WORDS[w];
          const reg = REGIONS[regKey];
          const intensity = r.wordIntensity[w];
          const bgAlpha = intensity * 0.22 + (intensity > 0 ? 0.04 : 0);
          const chip = el("div", {
            class: "word-chip",
            style: `--region-color: ${reg.hex}; --intensity: ${bgAlpha};`,
          },
            el("span", { style: "display:inline-flex; align-items:center; gap:8px;" },
              el("span", { class: "dot", style: `background:${reg.hex};` }),
              el("span", { class: "word" }, w)
            ),
            el("span", { class: "val" }, `${Math.round(intensity * 100)}%`)
          );
          grid.append(chip);
        });
        group.append(title, grid);
        return group;
      }

      container.append(sortAndRender(top10, "강한 사고력 10"));
      container.append(sortAndRender(bottom10, "약한 사고력 10"));
    }

    /* =====================================================
       AI Report — Gemini via Cloudflare Worker
       ===================================================== */
    async function fetchAIReport() {
      const r = state.result;

      // Writing answers snapshot (Q29, Q30) — the Worker will grade these 0–5 each
      const writingSubmissions = [
        {
          n: 29,
          question: QUESTIONS.find(q => q.n === 29).question,
          fields: {
            similarities: (state.answers[29]?.similarities || "").slice(0, 1200),
            differences: (state.answers[29]?.differences || "").slice(0, 1200),
          },
          maxScore: 5,
        },
        {
          n: 30,
          question: QUESTIONS.find(q => q.n === 30).question,
          fields: {
            answer: (state.answers[30]?.answer || "").slice(0, 1500),
          },
          maxScore: 5,
        }
      ];

      // Send preliminary summary + writing to Worker
      // The Worker will:
      //   1) grade writing (0–5 each)
      //   2) return grades + a final personalized report (already informed by the final total)
      // We include current MC-only summary for context; Worker finalizes the report using graded writing.
      const regionSummary = Object.keys(REGIONS).map(k => ({
        key: k,
        area: REGIONS[k].area,
        kr: REGIONS[k].kr,
        absolute: Math.round(r.regionAbs[k] * 10) / 10,
        relativeZ: Math.round(r.regionRel[k] * 100) / 100,
      }));

      const allWords = Object.keys(WORDS)
        .filter(w => MAX_WORD[w] > 0)
        .map(w => ({ word: w, region: REGIONS[WORDS[w]].area, intensity: Math.round(r.wordIntensity[w] * 100) }))
        .sort((a, b) => b.intensity - a.intensity);

      const payload = {
        studentName: state.studentName,
        school: state.school || "",
        grade: state.grade || "",

        // Preliminary (writing not yet graded)
        preliminaryMcScore: { correct: r.mcCorrect, total: r.mcTotal, mcPoints: r.mcPoints, mcPointsMax: r.mcPointsMax },

        regions: regionSummary,                       // absolute% + z
        regionMean: Math.round(r.regionMean * 10) / 10,
        regionStdev: Math.round(r.regionStdev * 10) / 10,
        strongest: r.strongest.map(k => REGIONS[k].area),
        weakest: r.weakest.map(k => REGIONS[k].area),
        topWords: allWords.slice(0, 8),
        bottomWords: allWords.slice(-8).reverse(),

        // Raw writing submissions for grading
        writingSubmissions,
      };

      try {
        const resp = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!resp.ok) {
          const errText = await resp.text().catch(() => "");
          throw new Error(`Worker returned ${resp.status}${errText ? ": " + errText.slice(0, 200) : ""}`);
        }

        const data = await resp.json();
        const reportMarkdown = data.report || "";
        const writingGrades = data.writingGrades || {};   // { "29": { score, feedback }, "30": { score, feedback } }

        if (!reportMarkdown.trim()) {
          throw new Error("Empty report from Worker");
        }

        // Re-compute result with writing scores included
        const writingScores = {};
        Object.keys(writingGrades).forEach(k => {
          const g = writingGrades[k];
          if (g && typeof g.score === "number") writingScores[Number(k)] = g.score;
        });
        state.writingGrades = writingGrades;
        state.writingPending = false;
        state.result = computeResult(writingScores);

        // Render the full result view now that scores are finalized
        renderResult();

        // Render the AI report at the bottom
        renderAIReport(reportMarkdown, data.model);
      } catch (err) {
        console.error("AI report error:", err);
        renderAIError(err);
      }
    }

                      <div class="hint" style="color: var(--ink-3);">모든 문항 채점과 AI 분석이 함께 진행됩니다 (약 10-20초)</div>
                    </div>
                  </div>
                `;
                fetchAIReport();
              }
            }, "다시 분석 시도")
          )
        )
      );
    }

    /* Very small markdown renderer tailored for Gemini output */
    function miniMarkdown(md) {
      // Normalize
      md = md.replace(/\r\n/g, "\n");
      // Escape base HTML
      md = md.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

      // Split into blocks by double newline
      const blocks = md.split(/\n{2,}/);
      const html = blocks.map(block => {
        block = block.trim();
        if (!block) return "";

        // Headings
        if (/^####\s+/.test(block)) return `<h5>${inline(block.replace(/^####\s+/, ""))}</h5>`;
        if (/^###\s+/.test(block)) return `<h4>${inline(block.replace(/^###\s+/, ""))}</h4>`;
        if (/^##\s+/.test(block)) return `<h3>${inline(block.replace(/^##\s+/, ""))}</h3>`;
        if (/^#\s+/.test(block)) return `<h3>${inline(block.replace(/^#\s+/, ""))}</h3>`;

        // Lists (- or *)
        if (/^(\-|\*)\s+/m.test(block) && block.split("\n").every(l => /^(\-|\*)\s+|^\s*$/.test(l))) {
          const items = block.split("\n").filter(l => l.trim()).map(l => `<li>${inline(l.replace(/^(\-|\*)\s+/, ""))}</li>`).join("");
          return `<ul>${items}</ul>`;
        }

        // Numbered
        if (/^\d+\.\s+/m.test(block) && block.split("\n").every(l => /^\d+\.\s+|^\s*$/.test(l))) {
          const items = block.split("\n").filter(l => l.trim()).map(l => `<li>${inline(l.replace(/^\d+\.\s+/, ""))}</li>`).join("");
          return `<ol>${items}</ol>`;
        }

        // Blockquote-like intro
        if (/^&gt;\s+/.test(block)) {
          return `<p class="intro-para">${inline(block.replace(/^&gt;\s+/, ""))}</p>`;
        }

        // Paragraph
        return `<p>${inline(block.replace(/\n/g, "<br>"))}</p>`;
      }).join("\n");

      return html;

      function inline(s) {
        // **bold**
        s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        // *italic*
        s = s.replace(/(^|[^*])\*([^*]+)\*(?!\*)/g, "$1<em>$2</em>");
        return s;
      }
    }

    function renderAIReport(markdown, modelUsed) {
      const container = $("#ai-report");
      container.innerHTML = "";

      // Build structured content: we expect Gemini to return markdown with sections
      const contentHtml = miniMarkdown(markdown);

      const content = el("div", { class: "report-content" });
      content.innerHTML = contentHtml;

      // Wrap the strongest/weakest/solution markers with special classes
      // We instruct Gemini to use ::STRONG::, ::WEAK::, ::SOL:: markers at start of h4s
      content.querySelectorAll("h4").forEach(h => {
        const t = h.textContent.trim();
        let tag = "", cls = "";
        if (t.startsWith("[강점]")) { cls = "strength-block"; tag = "강점"; h.textContent = t.replace("[강점]", "").trim(); }
        else if (t.startsWith("[약점]")) { cls = "weakness-block"; tag = "약점"; h.textContent = t.replace("[약점]", "").trim(); }
        else if (t.startsWith("[솔루션]")) { cls = "solution-card"; tag = "솔루션"; h.textContent = t.replace("[솔루션]", "").trim(); h.className = "sol-title"; }
        if (cls) {
          // Wrap h4 + next sibling (p or ul) into a block
          const wrapper = document.createElement("div");
          wrapper.className = cls;
          if (tag && cls !== "solution-card") {
            const tagEl = document.createElement("div");
            tagEl.className = "tag";
            tagEl.textContent = tag;
            wrapper.appendChild(tagEl);
          }
          const parent = h.parentNode;
          parent.insertBefore(wrapper, h);
          wrapper.appendChild(h);
          // Move following siblings until next h3/h4 into wrapper
          let next = wrapper.nextSibling;
          while (next && next.nodeType === 1 && !["H3", "H4"].includes(next.tagName)) {
            const toMove = next;
            next = next.nextSibling;
            wrapper.appendChild(toMove);
          }
        }
      });

      container.append(content);

    }

    function generatePDF() {
      const element = document.getElementById('view-result');

      // Temporarily hide action buttons so they are not in the PDF
      const actions = element.querySelector('.report-actions');
      if (actions) actions.style.display = 'none';

      // We explicitly try to add pagebreak avoid to major blocks
      const reportContent = document.querySelector('.report-content');
      if (reportContent) {
        // Tag headings to avoid breaks after them, and strength/weakness blocks to avoid breaking inside
        reportContent.querySelectorAll('h3, h4, h5, .strength-block, .weakness-block, .solution-card').forEach(el => {
          el.style.pageBreakInside = 'avoid';
          el.style.breakInside = 'avoid';
        });
      }

      const opt = {
        margin: [10, 0, 15, 0], // top, left, bottom, right in mm
        filename: `${state.studentName || '학생'}_사고력_리포트.pdf`,
        image: { type: 'png' }, // PNG prevents any JPEG compression artifacts (haziness)
        html2canvas: { scale: 4, useCORS: true, scrollY: 0, backgroundColor: '#ffffff' },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
      };

      // Also hide the HTML footer so we can draw it cleanly on every PDF page
      const htmlFooter = element.querySelector('.global-footer');
      if (htmlFooter) htmlFooter.style.display = 'none';

      html2pdf().set(opt).from(element).toPdf().get('pdf').then(function (pdf) {
        // Draw the footer on every page
        const totalPages = pdf.internal.getNumberOfPages();
        for (let i = 1; i <= totalPages; i++) {
          pdf.setPage(i);
          pdf.setFontSize(10);
          pdf.setTextColor(150);
          pdf.text('©지혜의산실', 105, pdf.internal.pageSize.getHeight() - 8, null, null, 'center');
        }
      }).save().then(() => {
        // Restore actions and footer
        if (actions) actions.style.display = '';
        if (htmlFooter) htmlFooter.style.display = '';
      });
    }

    /* =====================================================
       Init

    renderIntro();

  </script>
