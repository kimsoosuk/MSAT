<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#1a1612" />
  <meta name="robots" content="noindex, nofollow" />
  <title>MSAT В· мӮ¬кі л Ҙ нҶөн•© лҰ¬нҸ¬нҠё (кҙҖлҰ¬мһҗ)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@300..700&family=Noto+Serif+KR:wght@400..700&family=Noto+Sans+KR:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="../shared/styles.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    /* ============ Admin gate ============ */
    .gate {
      max-width: 440px;
      margin: 80px auto;
      padding: 40px 32px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      text-align: center;
    }
    .gate-title {
      font-family: var(--serif);
      font-size: 1.4rem;
      margin: 0 0 8px;
      color: var(--ink);
    }
    .gate-sub {
      font-family: var(--serif);
      font-style: italic;
      color: var(--ink-3);
      font-size: 0.92rem;
      margin-bottom: 24px;
    }
    .gate-input {
      width: 100%;
      font-family: var(--mono);
      font-size: 1rem;
      padding: 10px 4px;
      border: none;
      border-bottom: 1.5px solid var(--line-2);
      background: transparent;
      outline: none;
      text-align: center;
      letter-spacing: 0.2em;
    }
    .gate-input:focus { border-bottom-color: var(--accent); border-bottom-width: 2px; padding-bottom: 9px; }
    .gate-msg {
      margin-top: 14px;
      min-height: 18px;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    /* ============ Body ============ */
    .admin-header {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 12px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }
    .admin-header h1 {
      font-family: var(--serif);
      font-weight: 500;
      font-size: 1.5rem;
      margin: 0;
      letter-spacing: -0.01em;
    }
    .admin-header h1 em { font-style: italic; color: var(--accent); }
    .admin-header .badge {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      padding: 3px 10px;
      background: var(--ink);
      color: var(--paper);
      border-radius: 3px;
      text-transform: uppercase;
    }

    /* Student chooser */
    .admin-chooser {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }
    .student-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }
    .student-entry {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      transition: all .15s;
    }
    .student-entry:hover { box-shadow: var(--shadow-sm); border-color: var(--line-2); }
    .student-entry-main {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .student-entry-name {
      font-family: var(--serif);
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--ink);
    }
    .student-entry-id {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--ink-4);
      letter-spacing: 0.04em;
    }
    .student-entry-subjects {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .subject-chip {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--bg-2);
      color: var(--ink-3);
    }
    .subject-chip.done {
      background: var(--success);
      color: var(--paper);
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
      font-family: var(--serif);
      font-style: italic;
      color: var(--ink-3);
    }

    /* Report body reused from common styles */
    .admin-body {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Admin gate (password prompt) -->
    <div id="gate-view" class="view active">
      <div class="gate">
        <h2 class="gate-title">кҙҖлҰ¬мһҗ мқёмҰқ</h2>
        <p class="gate-sub">мӮ¬кі л Ҙ нҶөн•© лҰ¬нҸ¬нҠёлҠ” кҙҖлҰ¬мһҗл§Ң м—ҙлһҢн•  мҲҳ мһҲмҠөлӢҲлӢӨ.</p>
        <input type="password" class="gate-input" id="gate-input" placeholder="ACCESS KEY" autocomplete="off" />
        <div class="gate-msg" id="gate-msg"></div>
      </div>
    </div>

    <!-- Student chooser -->
    <div id="chooser-view" class="view">
      <header class="admin-header">
        <h1>MSAT В· <em>Brain Report</em></h1>
        <span class="badge">Admin</span>
      </header>
      <div class="admin-chooser">
        <p style="font-family:var(--serif); color:var(--ink-3); font-style:italic; margin: 0 0 6px;">
          мқҙ кё°кё°м—җ м ҖмһҘлҗң н•ҷмғқ кё°лЎқ лӘ©лЎқмһ…лӢҲлӢӨ. нҶөн•© лҰ¬нҸ¬нҠёлҘј ліј н•ҷмғқмқ„ м„ нғқн•ҳм„ёмҡ”.
        </p>
        <div class="student-list" id="student-list"></div>
      </div>
    </div>

    <!-- Report view -->
    <div id="report-view" class="view">
      <header class="admin-header">
        <h1>MSAT В· <em>Brain Report</em></h1>
        <span class="badge">Admin</span>
      </header>
      <div class="admin-body" id="view-result">
        <!-- Contents injected by brain-report.js logic -->
      </div>
    </div>
  </div>

  <script type="module">
    import {
      REGIONS, REGION_KEYS, WORDS,
      loadAllResults, WORKER_URL,
    } from "../shared/data.js";

    /* ============================================================
       Admin access key вҖ” URL query лҳҗлҠ” мһ…л Ҙ (нҒҙлқјмқҙм–ёнҠёмёЎ кё°ліё ліҙнҳё)
       мғқмӮ° нҷҳкІҪм—җм„ңлҠ” лҚ” к°•н•ң ліҙнҳё(IP м ңн•ң, auth н”„лЎқмӢң л“ұ)лҘј к¶ҢмһҘ.
       ============================================================ */
    const ADMIN_KEY = "msat2026";  // мқҙ к°’мқ„ ліҖкІҪн•ҳм—¬ м ‘к·ј м ңн•ң

    const $  = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));

    function showView(id) {
      $$(".view").forEach(v => v.classList.remove("active"));
      const v = document.getElementById(id);
      if (v) v.classList.add("active");
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    // URL мҝјлҰ¬лЎң мқёмҰқ bypass к°ҖлҠҘ (л¶Ғл§ҲнҒ¬мҡ©)
    const params = new URLSearchParams(location.search);
    const queryKey = params.get("key");
    if (queryKey === ADMIN_KEY) {
      sessionStorage.setItem("msat.admin", "1");
    }

    const isAuthed = sessionStorage.getItem("msat.admin") === "1";
    if (isAuthed) {
      showChooser();
    } else {
      setupGate();
    }

    function setupGate() {
      const input = $("#gate-input");
      const msg = $("#gate-msg");
      input.focus();
      input.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        if (input.value === ADMIN_KEY) {
          sessionStorage.setItem("msat.admin", "1");
          msg.textContent = "";
          showChooser();
        } else {
          msg.textContent = "мһҳлӘ»лҗң нӮӨмһ…лӢҲлӢӨ.";
          input.value = "";
        }
      });
    }

    /* ============================================================
       н•ҷмғқ лӘ©лЎқ н‘ңмӢң
       localStorageмқҳ msat.results кө¬мЎ°:
         { <studentId>: { english: {...}, korean: {...}, math: {...} } }
       ============================================================ */
    function readAllLocalStudents() {
      try {
        const raw = localStorage.getItem("msat.results");
        if (!raw) return {};
        return JSON.parse(raw);
      } catch (e) {
        return {};
      }
    }

    async function showChooser() {
      showView("chooser-view");
      const list = $("#student-list");
      list.innerHTML = '<div class="ai-loading" style="padding:40px;"><div class="pulse"></div><div class="msg">DBм—җм„ң н•ҷмғқ лӘ©лЎқмқ„ л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</div></div>';

      try {
        const resp = await fetch(`${WORKER_URL}/admin/students`, {
          headers: { "X-Admin-Key": ADMIN_KEY }
        });
        if (!resp.ok) throw new Error("API м—°лҸҷ мҳӨлҘҳ");
        const data = await resp.json();
        const students = data.students || [];

        list.innerHTML = "";
        if (students.length === 0) {
          list.innerHTML = '<div class="empty-state">DBм—җ м ҖмһҘлҗң н•ҷмғқ кё°лЎқмқҙ м—ҶмҠөлӢҲлӢӨ.</div>';
          return;
        }

        students.forEach(s => {
          const headline = [s.name, s.school, s.grade].filter(Boolean).join(" В· ");
          const completed = (s.subjects_completed || "").split(",");

          // кіјлӘ© мғҒнғң м№© + л·°м–ҙ м—ҙкё° лІ„нҠј мғқм„ұ
          const subjectChips = ["english", "korean", "math"].map(subId => {
            const done = completed.includes(subId);
            const label = { english: "мҳҒм–ҙ", korean: "көӯм–ҙ", math: "мҲҳн•ҷ" }[subId];
            if (done) {
              return `<button class="subject-chip done" onclick="window.open('../${subId}/index.html?admin_view=1&student_id=${s.student_id}&student_name=${encodeURIComponent(s.name)}', '_blank')" style="cursor:pointer; border:none; display:inline-flex; align-items:center; gap:4px;">${label} л ҲнҸ¬нҠё ліҙкё°</button>`;
            } else {
              return `<span class="subject-chip" style="opacity:0.5;">${label} лҜёмқ‘мӢң</span>`;
            }
          }).join("");

          const entry = document.createElement("div");
          entry.className = "student-entry";
          entry.innerHTML = `
            <div class="student-entry-main">
              <div class="student-entry-name">${escapeHtml(headline)}</div>
              <div class="student-entry-id">${s.student_id} В· мөңк·ј мқ‘мӢң: ${s.last_seen_at}</div>
              <div class="student-entry-subjects">${subjectChips}</div>
            </div>
            <button class="btn btn-primary" data-sid="${s.student_id}">
              нҶөн•© Brain Report вҶ’
            </button>
          `;
          
          entry.querySelector(".btn-primary").addEventListener("click", async () => {
            // Brain ReportлҘј мң„н•ҙм„ңлҠ” лӘЁл“  кіјлӘ©мқҳ мғҒм„ё JSONмқҙ н•„мҡ”н•ҳлҜҖлЎң лЁјм Җ fetch
            const btn = entry.querySelector(".btn-primary");
            btn.disabled = true;
            btn.textContent = "л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...";
            try {
              const res = await fetch(`${WORKER_URL}/admin/student/${s.student_id}`, {
                headers: { "X-Admin-Key": ADMIN_KEY }
              });
              if (!res.ok) throw new Error("лҚ°мқҙн„° нҺҳм№ҳ мӢӨнҢЁ");
              const detailData = await res.json();
              if (Object.keys(detailData.subjects || {}).length === 0) {
                 alert("мӢңн—ҳ кІ°кіј лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ.");
                 return;
              }
              // мқҙм „ localStorage нҸ¬л§·(subjectMap)мңјлЎң ліҖнҷҳ нӣ„ generateReport нҳём¶ң
              const subjectMap = {};
              for (const [subId, r] of Object.entries(detailData.subjects)) {
                subjectMap[subId] = {
                  studentName: s.name,
                  school: s.school,
                  grade: s.grade,
                  totalPoints: r.total_points,
                  regionAbs: r.regionAbs,
                  wordIntensity: r.wordIntensity,
                  perSection: r.perSection
                };
              }
              generateReport(s.student_id, subjectMap);
            } catch(e) {
              alert(e.message);
            } finally {
              btn.disabled = false;
              btn.textContent = "нҶөн•© Brain Report вҶ’";
            }
          });
          list.appendChild(entry);
        });
      } catch (err) {
        list.innerHTML = `<div class="empty-state" style="color:var(--accent);">н•ҷмғқ лӘ©лЎқмқ„ л¶Ҳлҹ¬мҳ¬ мҲҳ м—ҶмҠөлӢҲлӢӨ.<br>${err.message}</div>`;
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    /* ============================================================
       нҶөн•© лҰ¬нҸ¬нҠё мғқм„ұ
         1) лЎңм»¬ мҠӨлғ…мғ·мңјлЎңл¶Җн„° 3кіјлӘ©мқ„ н•©м№ң мҳҒм—ӯ нҷңм„ұлҸ„/лӢЁм–ҙ нҷңм„ұлҸ„ кі„мӮ°
         2) м •к·ңл¶„нҸ¬ кё°л°ҳ м¶”м •мңјлЎң мғҒмң„ % мӮ°м¶ң
         3) Workerмқҳ /?type=brain нҳём¶ң
         4) кІ°кіј л ҢлҚ”л§Ғ + PDF мҳөм…ҳ
       ============================================================ */
    async function generateReport(studentId, subjectMap) {
      showView("report-view");
      const root = $("#view-result");
      root.innerHTML = `
        <div class="ai-loading" style="padding:60px 20px;">
          <div class="pulse"></div>
          <div class="msg">нҶөн•© мӮ¬кі л Ҙмқ„ кі„мӮ°н•ҳкі  мһҲмҠөлӢҲлӢӨвҖҰ</div>
          <div class="hint">Aggregating В· м•Ҫ 15мҙҲ</div>
        </div>
      `;

      // 1) кіјлӘ© н•©мӮ° вҖ” к°Ғ кіјлӘ©мқҳ regionAbsмҷҖ wordIntensityлҘј нҸүк· 
      const available = Object.keys(subjectMap);
      const first = subjectMap[available[0]];
      const student = {
        name: first.studentName,
        school: first.school,
        grade: first.grade,
        studentId,
      };

      const aggregated = aggregateSubjects(subjectMap, available);

      // 2) Worker нҳём¶ң
      const payload = {
        student,
        subjects: subjectMap,
        aggregated,
        availableSubjects: available,
      };

      let reportMarkdown = "";
      let modelUsed = null;
      try {
        const url = `${WORKER_URL}?type=brain`;
        const resp = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!resp.ok) {
          const errText = await resp.text().catch(() => "");
          throw new Error(`Worker ${resp.status}: ${errText.slice(0, 200)}`);
        }
        const data = await resp.json();
        reportMarkdown = data.report || "";
        modelUsed = data.model;
        if (!reportMarkdown.trim()) throw new Error("Empty report");
      } catch (err) {
        root.innerHTML = `
          <div class="ai-error" style="padding:50px 20px;">
            <div style="font-size:1.1rem; margin-bottom:8px;">лҰ¬нҸ¬нҠё мғқм„ұ мӢӨнҢЁ</div>
            <div style="font-family:var(--mono); font-size:0.78rem; color:var(--ink-4);">${escapeHtml(err.message)}</div>
            <div style="margin-top:20px;">
              <button class="btn btn-ghost" onclick="location.reload()">мғҲлЎңкі м№Ё</button>
            </div>
          </div>
        `;
        return;
      }

      // 3) л ҢлҚ”л§Ғ
      renderFullReport(root, student, aggregated, reportMarkdown, modelUsed);
    }

    /* ============================================================
       aggregateSubjects вҖ” кіјлӘ©лі„ мҠӨлғ…мғ·мқ„ н•ҳлӮҳлЎң н•©м№Ё
       мҳҒм—ӯ нҷңм„ұлҸ„лҠ” к°ҖмӨ‘ нҸүк· (кіјлӘ© мҲҳлЎң нҸүк· ),
       мғҒмң„ % лҠ” м •к·ңл¶„нҸ¬ CDF кё°л°ҳ м¶”м •.
       ============================================================ */
    function aggregateSubjects(subjectMap, availableSubjects) {
      const regionAbs = {};   // key вҶ’ нҸүк·  %
      const wordIntensity = {}; // word вҶ’ нҸүк·  intensity

      REGION_KEYS.forEach(k => { regionAbs[k] = 0; });

      // к°Ғ кіјлӘ©мқҳ regionAbsлҘј нҸүк· 
      availableSubjects.forEach(subId => {
        const s = subjectMap[subId];
        if (!s || !s.regionAbs) return;
        REGION_KEYS.forEach(k => {
          regionAbs[k] += (s.regionAbs[k] || 0) / availableSubjects.length;
        });
      });

      // лӢЁм–ҙлі„ intensity нҸүк·  (лӢЁм–ҙк°Җ л“ұмһҘн•ҳм§Җ м•ҠмқҖ кіјлӘ©м—җм„ңлҠ” л¬ҙмӢң)
      const wordCount = {};
      availableSubjects.forEach(subId => {
        const s = subjectMap[subId];
        if (!s || !s.wordIntensity) return;
        Object.entries(s.wordIntensity).forEach(([w, inten]) => {
          if (inten > 0 || wordIntensity[w] !== undefined) {
            wordIntensity[w] = (wordIntensity[w] || 0) + inten;
            wordCount[w] = (wordCount[w] || 0) + 1;
          }
        });
      });
      Object.keys(wordIntensity).forEach(w => {
        wordIntensity[w] = wordIntensity[w] / wordCount[w];
      });

      // мҳҒм—ӯлі„ мғҒмң„ % м¶”м • (м •к·ңл¶„нҸ¬ к°Җм •)
      // к°Җм •: нҷңм„ұлҸ„к°Җ 65% к·јмІҳк°Җ мӨ‘мң„к°’(мғҒмң„ 50%)мқҙкі , SD=15
      // мқҙ к°Җм •мқҖ лҚ” л§ҺмқҖ лҚ°мқҙн„°к°Җ мҢ“мқҙл©ҙ мӢӨм ң л¶„нҸ¬лЎң лҢҖмІҙн•  кІғ.
      const regionPercentile = {};
      REGION_KEYS.forEach(k => {
        regionPercentile[k] = percentileOf(regionAbs[k]);
      });

      // мў…н•© мғҒмң„ % = 5к°ң мҳҒм—ӯ нҸүк· мқҳ percentile
      const overallAvg = REGION_KEYS.reduce((sum, k) => sum + regionAbs[k], 0) / REGION_KEYS.length;
      const overallPercentile = percentileOf(overallAvg);

      // лӢЁм–ҙ м •л ¬
      const wordList = Object.entries(wordIntensity)
        .filter(([w, v]) => v > 0)
        .map(([w, v]) => ({ word: w, region: REGIONS[WORDS[w]]?.area || "", intensity: v }))
        .sort((a, b) => b.intensity - a.intensity);

      // мҳҒм—ӯлі„ н‘ңмӨҖнҺём°Ё (к· нҳ•лҸ„)
      const absVals = REGION_KEYS.map(k => regionAbs[k]);
      const mean = absVals.reduce((a, b) => a + b, 0) / absVals.length;
      const regionStdev = Math.sqrt(absVals.reduce((a, b) => a + (b - mean) ** 2, 0) / absVals.length);

      return {
        regionAbs,
        regionPercentile,
        overallPercentile,
        wordIntensity,
        topWords: wordList.slice(0, 15),
        bottomWords: wordList.slice(-10),
        regionStdev,
      };
    }

    // м •к·ңл¶„нҸ¬ к°Җм •: mean=65, sd=15. score лҶ’мқ„мҲҳлЎқ мғҒмң„ %к°Җ мһ‘м•„м§җ.
    function percentileOf(score) {
      const mean = 65, sd = 15;
      const z = (score - mean) / sd;
      // к°„лӢЁн•ң мҳӨм°Ён•ЁмҲҳ к·јмӮ¬
      const p = 1 - normalCdf(z);
      return Math.max(1, Math.min(99, Math.round(p * 100)));
    }
    function normalCdf(z) {
      // Abramowitz & Stegun 7.1.26 к·јмӮ¬
      const t = 1 / (1 + 0.2316419 * Math.abs(z));
      const d = 0.3989422804 * Math.exp(-z * z / 2);
      const prob = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
      return z > 0 ? 1 - prob : prob;
    }

    function drawRadar(aggregated) {
      const canvas = document.getElementById("radar-chart");
      if (!canvas || typeof Chart === "undefined") return;
      const keys = REGION_KEYS;
      const labels = keys.map(k => REGIONS[k].area);
      const data = keys.map(k => Math.round(aggregated.regionAbs[k]));

      if (window._radarChart) window._radarChart.destroy();
      window._radarChart = new Chart(canvas, {
        type: "radar",
        data: {
          labels,
          datasets: [{
            label: "нҷңм„ұлҸ„",
            data,
            backgroundColor: "rgba(139, 42, 31, 0.12)",
            borderColor: "rgba(139, 42, 31, 0.85)",
            borderWidth: 2,
            pointBackgroundColor: keys.map(k => REGIONS[k].hex),
            pointBorderColor: "#fff",
            pointBorderWidth: 2,
            pointRadius: 5,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: { legend: { display: false } },
          scales: {
            r: {
              min: 0, max: 100,
              ticks: { stepSize: 25, font: { family: "'JetBrains Mono', monospace", size: 10 }, color: "#9a8d80", backdropColor: "transparent" },
              grid: { color: "rgba(107, 93, 82, 0.2)" },
              angleLines: { color: "rgba(107, 93, 82, 0.25)" },
              pointLabels: { font: { family: "'Fraunces', serif", size: 13, weight: "500" }, color: "#3d342c" }
            }
          },
          animation: { duration: 700 }
        }
      });
    }

    /* ============ Mini markdown ============ */
      function miniMarkdown(md) {
      md = md.replace(/\r\n/g, "\n");
      md = md.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const blocks = md.split(/\n{2,}/);
      return blocks.map(block => {
        block = block.trim();
        if (!block) return "";
        if (/^###\s+/.test(block))  return `<h4>${inline(block.replace(/^###\s+/, ""))}</h4>`;
        if (/^##\s+/.test(block))   return `<h3>${inline(block.replace(/^##\s+/, ""))}</h3>`;
        if (/^#\s+/.test(block))    return `<h3>${inline(block.replace(/^#\s+/, ""))}</h3>`;
        if (/^(\-|\*)\s+/m.test(block) && block.split("\n").every(l => /^(\-|\*)\s+|^\s*$/.test(l))) {
          const items = block.split("\n").filter(l => l.trim()).map(l => `<li>${inline(l.replace(/^(\-|\*)\s+/, ""))}</li>`).join("");
          return `<ul>${items}</ul>`;
        }
        if (/^\d+\.\s+/m.test(block) && block.split("\n").every(l => /^\d+\.\s+|^\s*$/.test(l))) {
          const items = block.split("\n").filter(l => l.trim()).map(l => `<li>${inline(l.replace(/^\d+\.\s+/, ""))}</li>`).join("");
          return `<ol>${items}</ol>`;
        }
        if (/^&gt;\s+/.test(block)) {
          return `<p class="intro-para">${inline(block.replace(/^&gt;\s+/, ""))}</p>`;
        }
        return `<p>${inline(block.replace(/\n/g, "<br>"))}</p>`;
      }).join("\n");

      function inline(s) {
        s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        s = s.replace(/(^|[^*])\*([^*]+)\*(?!\*)/g, "$1<em>$2</em>");
        return s;
      }
    }

    function generatePDF(name) {
      if (typeof html2pdf === "undefined") { alert("PDF лқјмқҙлёҢлҹ¬лҰ¬лҘј л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ."); return; }
      const element = document.getElementById('view-result');
      const actions = element.querySelector('.report-actions');
      if (actions) actions.style.display = 'none';

      const opt = {
        margin: [10, 8, 18, 8],
        filename: `${name || 'н•ҷмғқ'}_нҶөн•©мӮ¬кі л ҘлҰ¬нҸ¬нҠё.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: {
          scale: 2,
          useCORS: true,
          scrollY: 0,
          backgroundColor: '#faf6ef',
          onclone: (clonedDoc) => {
            const s = clonedDoc.createElement('style');
            s.textContent = [
              'html, body { margin: 0 !important; padding: 0 !important; background: #faf6ef !important; overflow: visible !important; height: auto !important; }',
              '.app, #view-result { background: #faf6ef !important; padding: 0 !important; margin: 0 !important; overflow: visible !important; height: auto !important; }',
              '* { -webkit-text-stroke: 0.3px currentColor; box-sizing: border-box !important; }',
              '.page-break-before { page-break-before: always !important; break-before: page !important; }',
              '.section-heading { page-break-before: always !important; break-before: page !important; page-break-after: avoid !important; margin: 40px 0 20px !important; display: block !important; }',
              '.region-card, .radar-wrap { page-break-inside: avoid !important; margin-bottom: 20px !important; }',
              '.ai-report-section-wrap { page-break-inside: auto !important; margin: 10px 0 30px !important; }',
              '.ai-report-card { page-break-inside: auto !important; border: 1px solid #d9cfbe; }',
              '.ai-report-card h3, .ai-report-card h4 { page-break-after: avoid !important; page-break-inside: avoid !important; }',
              '.ai-report-card p, .ai-report-card ul, .ai-report-card ol, .ai-report-card li { page-break-inside: avoid !important; margin-bottom: 8px !important; }',
              '.global-footer { display: none !important; }',
            ].join('\n');
            clonedDoc.head.appendChild(s);
          }
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['css', 'legacy'] }
      };

      html2pdf().set(opt).from(element).toPdf().get('pdf').then(function (pdf) {
        const totalPages = pdf.internal.getNumberOfPages();
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        const canvas = document.createElement('canvas');
        canvas.width = 400;
        canvas.height = 40;
        const ctx = canvas.getContext('2d');
        ctx.font = '16px sans-serif';
        ctx.fillStyle = '#9a8d80';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('в“’м§ҖнҳңмқҳмӮ°мӢӨ', 200, 20);
        const footerImg = canvas.toDataURL('image/png');

        for (let i = 1; i <= totalPages; i++) {
          pdf.setPage(i);
          pdf.addImage(footerImg, 'PNG', pageWidth / 2 - 20, pageHeight - 10, 40, 4);
        }
      }).save().then(() => {
        if (actions) actions.style.display = '';
      });
    }
